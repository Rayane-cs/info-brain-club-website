<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events &amp; Agenda | AI House UHBC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Syne:wght@600;700;800&display=swap">
  <link rel="stylesheet" href="/css/homepage.css">
  <link rel="stylesheet" href="/css/events.css">
  <script src="/js/component-loader.js"></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body class="has-page-loader">

  <div id="page-loader" class="page-loader" aria-hidden="true">
    <div class="loader-ring"></div>
    <p class="loader-text">Loading events...</p>
  </div>

  <div class="page-hero page-fade">
    <div class="page-hero-inner">
      <span class="page-hero-tag">AI House UHBC</span>
      <h1 class="page-hero-title">Events &amp; Agenda</h1>
      <p class="page-hero-desc">Stay updated with our upcoming events, workshops, and seminars at AI House UHBC.</p>
      <div class="page-hero-line"></div>
    </div>
  </div>

  <section class="spotlight page-fade" id="spotlightSection" style="display:none;">
    <div class="spotlight-inner">
      <div class="spotlight-info">
        <span class="spotlight-tag" id="spotCategory">Upcoming</span>
        <h2 class="spotlight-title" id="spotTitle">Next Event</h2>
        <div class="spotlight-meta">
          <div class="spotlight-meta-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <span id="spotDate">—</span>
          </div>
          <div class="spotlight-meta-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <span id="spotTime">—</span>
          </div>
          <div class="spotlight-meta-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
            <span id="spotLocation">—</span>
          </div>
        </div>
        <div class="spotlight-seats-bar" id="spotSeatsBar" style="display:none;">
          <div class="spotlight-seats-label"><span id="spotTaken">0</span> / <span id="spotCap">0</span> seats registered</div>
          <div class="seats-track"><div class="seats-fill" id="spotFill" style="width:0%"></div></div>
        </div>
        <a class="btn btn-primary" id="spotBtn" href="#">Register Now</a>
      </div>
      <div class="spotlight-image-wrap" id="spotImgWrap">
        <div class="spotlight-placeholder"></div>
      </div>
    </div>
  </section>

  <main class="events-body page-fade">
    <div>
      <h2 style="font-family:var(--font-display);font-size:1.3rem;color:var(--green);margin-bottom:1.5rem;">All Upcoming Events</h2>
      <div class="upcoming-grid" id="eventsGrid">
        <div class="events-loading">
          <div class="events-spinner"></div>
          <p>Loading events...</p>
        </div>
      </div>
    </div>

    <div class="calendar-widget">
      <div class="cal-header">
        <button class="cal-nav" id="calPrev" aria-label="Previous month">&#8249;</button>
        <span class="cal-month" id="calMonthLabel"></span>
        <button class="cal-nav" id="calNext" aria-label="Next month">&#8250;</button>
      </div>
      <div class="cal-grid">
        <div class="cal-days-header">
          <span>Su</span><span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span>
        </div>
        <div class="cal-days" id="calDays"></div>
      </div>
      <div class="cal-legend">
        <div class="cal-legend-item">
          <div class="cal-legend-dot"></div>
          <span>Event scheduled</span>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js" defer crossorigin="anonymous"></script>
  <script src="/js/utils.js" defer></script>
  <script src="/js/navbar.js" defer></script>
  <script src="/js/page-loader.js" defer></script>
  <script src="/js/events.js" defer></script>

</body>
</html>
