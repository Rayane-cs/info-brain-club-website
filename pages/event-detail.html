<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event | AI House UHBC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Syne:wght@600;700;800&display=swap">
  <link rel="stylesheet" href="/css/homepage.css">
  <link rel="stylesheet" href="/css/event-detail.css">
  <script src="/js/component-loader.js"></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body class="has-page-loader">

  <div id="page-loader" class="page-loader" aria-hidden="true">
    <div class="loader-ring"></div>
    <p class="loader-text">Loading event...</p>
  </div>

  <main class="event-main page-fade">
    <div class="event-page">
      <a href="/pages/events.html" class="event-back-link">← Back to events</a>

      <header class="event-header">
        <div class="event-kicker" id="event-category-pill">Event</div>
        <h1 class="event-title" id="event-title">Loading...</h1>
        <div class="event-underline"></div>
        <p class="event-subtitle" id="event-description"></p>
      </header>

      <article class="event-detail-card">
        <div class="event-detail-image">
          <img id="event-image" src="https://images.unsplash.com/photo-1559136555-9303baea8ebd?auto=format&w=1200" alt="Event image">
          <div class="event-chip" id="event-chip-text">Upcoming</div>
        </div>

        <div class="event-detail-info-bar">
          <span class="info-item"><span id="event-date-text">Date</span></span>
          <span class="info-item"><span id="event-time-text">Time</span></span>
          <span class="info-item"><span id="event-location-text">Location</span></span>
        </div>

        <div class="event-detail-body">
          <section class="event-section">
            <h2 class="section-heading">About this event</h2>
            <p class="section-text" id="event-long-description"></p>
          </section>

          <section class="event-section">
            <h2 class="section-heading">Seats</h2>
            <p class="seats-text">Registered: <strong><span id="taken-seats">0</span> / <span id="total-seats">0</span></strong></p>
            <div class="progress-track"><div class="progress-fill" id="seats-progress" style="width:0%"></div></div>
          </section>

          <div id="event-error" class="event-error" hidden></div>

          <div class="button-wrap">
            <button type="button" class="btn-register" id="register-btn">Register Now</button>
            <button type="button" class="btn-cancel-reg" id="cancel-reg-btn" style="display:none">Cancel Registration</button>
          </div>
        </div>
      </article>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js" defer crossorigin="anonymous"></script>
  <script src="/js/utils.js" defer></script>
  <script src="/js/navbar.js" defer></script>
  <script src="/js/page-loader.js" defer></script>
  <script src="/js/event-detail.js" defer></script>

</body>
</html>
