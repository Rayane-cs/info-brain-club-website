<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | AI House UHBC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Syne:wght@600;700;800&display=swap">
  <link rel="stylesheet" href="/css/homepage.css">
  <link rel="stylesheet" href="/css/contact.css">
  <script src="/js/component-loader.js"></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body>

  <div class="page-hero">
    <div class="page-hero-inner">
      <span class="page-hero-tag">Get In Touch</span>
      <h2 class="page-hero-title">Contact Us</h2>
      <p class="page-hero-desc">Reach out to AI House UHBC — we'd love to hear from students, researchers, and partners.</p>
      <div class="page-hero-line"></div>
    </div>
  </div>

  <main>
    <div class="social-box">
      <div class="card-container">
        <h3 class="card-title">Facebook page</h3>
        <div class="card">
          <img src="/assets/scocial media/face_profile.png" alt="Facebook Profile" loading="lazy">
          <div class="card-overlay">
            <a href="https://www.facebook.com/people/AI-HOUSE-UHBC/61585214978330/" class="visit" target="_blank" rel="noopener">Visit</a>
          </div>
        </div>
      </div>
      <div class="card-container">
        <h3 class="card-title">Instagram profile</h3>
        <div class="card">
          <img src="/assets/scocial media/insta_profile.png" alt="Instagram Profile" loading="lazy">
          <div class="card-overlay">
            <a href="https://www.instagram.com/aihouseuhbc/" class="visit" target="_blank" rel="noopener">Visit</a>
          </div>
        </div>
      </div>
    </div>

    <h3 class="location">Location</h3>
    <div class="map">
      <iframe
        src="https://maps.google.com/maps?q=university%20of%20chlef&t=&z=13&ie=UTF8&iwloc=&output=embed"
        loading="lazy"
        title="University of Chlef on map">
      </iframe>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js" defer crossorigin="anonymous"></script>
  <script src="/js/utils.js" defer></script>
  <script src="/js/navbar.js" defer></script>

</body>
</html>
