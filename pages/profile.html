<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile | AI House UHBC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Syne:wght@600;700;800&display=swap">
  <link rel="stylesheet" href="/css/homepage.css">
  <link rel="stylesheet" href="/css/profile.css">
  <script src="/js/component-loader.js"></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body>

  <main class="profile-wrap">
    <div class="profile-inner">

      <div class="profile-page-head">
        <span class="head-eyebrow">Account</span>
        <h1>My Profile</h1>
      </div>

      <div class="profile-layout">

        <aside class="profile-sidebar">
          <div class="sidebar-avatar-card">
            <div class="avatar-ring-wrap">
              <svg class="avatar-ring" viewBox="0 0 120 120" fill="none" aria-hidden="true">
                <rect x="2" y="2" width="116" height="116" rx="58" stroke="url(#ringGrad)" stroke-width="1" stroke-dasharray="5 6"/>
                <defs>
                  <linearGradient id="ringGrad" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
                    <stop offset="0%" stop-color="#006633"/>
                    <stop offset="50%" stop-color="#00c853"/>
                    <stop offset="100%" stop-color="#006633" stop-opacity="0"/>
                  </linearGradient>
                </defs>
              </svg>
              <div class="profile-avatar" id="profileAvatar">
                <span id="profileInitials">U</span>
              </div>
            </div>
            <div class="sidebar-name-block">
              <div class="profile-display-name" id="profileDisplayName">Loading…</div>
              <div class="profile-username-text" id="profileUsernameText">@…</div>
            </div>
            <div class="sidebar-role-wrap">
              <span class="role-badge user" id="profile-role-sidebar">Member</span>
            </div>
            <button class="btn-edit-trigger" id="editProfileBtn">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              Edit Profile
            </button>
          </div>
        </aside>

        <div class="profile-main">

          <div id="displayView">
            <section class="info-section">
              <div class="section-header">
                <h2 class="section-label">
                  <span class="section-label-dot"></span>
                  Personal Info
                </h2>
              </div>
              <div class="section-body">
                <div class="info-grid">
                  <div class="info-group">
                    <label>Full Name</label>
                    <div class="info-value" id="profile-fullname">—</div>
                  </div>
                  <div class="info-group">
                    <label>Username</label>
                    <div class="info-value" id="profile-username">—</div>
                  </div>
                  <div class="info-group info-group--full">
                    <label>Email</label>
                    <div class="info-value" id="profile-email">—</div>
                  </div>
                  <div class="info-group info-group--full bio-group">
                    <label>Bio</label>
                    <div class="bio-text" id="profile-bio">No bio yet.</div>
                  </div>
                </div>
              </div>
            </section>

            <section class="info-section">
              <div class="section-header">
                <h2 class="section-label">
                  <span class="section-label-dot"></span>
                  Role &amp; Access
                </h2>
              </div>
              <div class="section-body">
                <div class="role-display-row">
                  <span class="role-badge user" id="profile-role">Member</span>
                  <p class="role-hint">Your role is assigned by the AI House team.</p>
                </div>
              </div>
            </section>
          </div>

          <div id="editView" class="profile-edit-form" hidden>
            <section class="info-section">
              <div class="section-header">
                <h2 class="section-label">
                  <span class="section-label-dot"></span>
                  Edit Profile
                </h2>
              </div>
              <div class="section-body">
                <form id="editProfileForm" class="edit-form-grid" autocomplete="off">
                  <div class="form-group form-col-full avatar-upload-group">
                    <label>Profile Picture</label>
                    <div class="avatar-upload-row">
                      <div class="avatar-upload-preview" id="avatarPreview">
                        <span id="avatarPreviewInitials">U</span>
                      </div>
                      <div class="avatar-upload-controls">
                        <label for="avatarFile" class="btn-upload-pic">
                          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                          Upload Photo
                        </label>
                        <input type="file" id="avatarFile" accept="image/*" style="display:none">
                        <span class="avatar-upload-hint">JPG, PNG or WebP · max 2 MB</span>
                      </div>
                    </div>
                    <label for="editAvatar" class="upload-or-divider">or paste an image URL</label>
                    <input type="url" id="editAvatar" class="form-control" placeholder="https://example.com/avatar.jpg">
                  </div>
                  <div class="form-group">
                    <label for="editFullname">Full Name</label>
                    <input type="text" id="editFullname" class="form-control" required placeholder="Your full name">
                  </div>
                  <div class="form-group">
                    <label for="editUsername">Username</label>
                    <input type="text" id="editUsername" class="form-control" required placeholder="@username">
                  </div>
                  <div class="form-group form-col-full">
                    <label for="editBio">Bio</label>
                    <textarea id="editBio" class="form-control" rows="4" placeholder="Tell us about yourself…"></textarea>
                  </div>
                  <div class="form-actions form-col-full">
                    <button type="button" class="btn-ghost" id="cancelEditBtn">Cancel</button>
                    <button type="submit" class="btn-primary-green" id="saveProfileBtn">
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                      Save Changes
                    </button>
                  </div>
                </form>
              </div>
            </section>
          </div>

        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js" defer crossorigin="anonymous"></script>
  <script src="/js/utils.js" defer></script>
  <script src="/js/navbar.js" defer></script>
  <script src="/js/profile.js" defer></script>

</body>
</html>
